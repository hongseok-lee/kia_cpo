name: Scrape Kia CPO

on:
  workflow_dispatch:
    inputs:
      verify_dom:
        description: "Number of rows to verify with Playwright DOM checks. Requires PLEOS_ID and PLEOS_PW repository secrets."
        required: false
        default: "0"
  schedule:
    # Every 15 minutes, offset from the top of the hour.
    - cron: "7,22,37,52 * * * *"

permissions:
  contents: write
  id-token: write

concurrency:
  group: kia-cpo-scrape
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      VERIFY_DOM: ${{ github.event_name == 'workflow_dispatch' && inputs.verify_dom || '0' }}
      PLEOS_ID: ${{ secrets.PLEOS_ID }}
      PLEOS_PW: ${{ secrets.PLEOS_PW }}
      NOTIFY_WEBHOOK_URL: ${{ secrets.NOTIFY_WEBHOOK_URL }}
      TS_OAUTH_CLIENT_ID: ${{ secrets.TS_OAUTH_CLIENT_ID }}
      TS_OAUTH_SECRET: ${{ secrets.TS_OAUTH_SECRET }}
      TS_TAGS: ${{ vars.TS_TAGS || 'tag:github-actions' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate Python syntax
        run: python -m compileall scrape_kia_cpo.py

      - name: Connect to Tailscale
        if: env.TS_OAUTH_CLIENT_ID != '' && env.TS_OAUTH_SECRET != ''
        uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: ${{ env.TS_TAGS }}

      - name: Install Playwright for DOM verification
        if: env.VERIFY_DOM != '0'
        run: |
          python -m pip install --upgrade pip
          python -m pip install playwright
          python -m playwright install --with-deps chromium

      - name: Prepare env file for DOM verification
        if: env.VERIFY_DOM != '0'
        run: |
          if [ -z "$PLEOS_ID" ] || [ -z "$PLEOS_PW" ]; then
            echo "::error::PLEOS_ID and PLEOS_PW repository secrets are required when verify_dom is non-zero."
            exit 1
          fi
          {
            printf 'PLEOS_ID=%s\n' "$PLEOS_ID"
            printf 'PLEOS_PW=%s\n' "$PLEOS_PW"
          } > .env

      - name: Scrape listings
        run: >-
          python scrape_kia_cpo.py
          --verify-dom "$VERIFY_DOM"
          --update-db db/kia_cpo_inventory.csv
          --db-report db/kia_cpo_inventory.update.json

      - name: Notify when new vehicles are added
        if: env.NOTIFY_WEBHOOK_URL != ''
        continue-on-error: true
        run: |
          python - <<'PY'
          import json
          import os
          import urllib.request

          report_path = "db/kia_cpo_inventory.update.json"
          with open(report_path, encoding="utf-8") as file:
              report = json.load(file)
          if not report.get("added_vehicles"):
              print("No newly added vehicles; notification skipped.")
              raise SystemExit(0)

          payload = {
              "event": "kia_cpo_new_vehicles",
              "repository": os.environ["GITHUB_REPOSITORY"],
              "run_id": os.environ["GITHUB_RUN_ID"],
              "scraped_at": report["scraped_at"],
              "added_count": len(report["added_vehicles"]),
              "vehicles": report["added_vehicles"],
          }
          request = urllib.request.Request(
              os.environ["NOTIFY_WEBHOOK_URL"],
              data=json.dumps(payload, ensure_ascii=False).encode("utf-8"),
              headers={"content-type": "application/json"},
              method="POST",
          )
          with urllib.request.urlopen(request, timeout=20) as response:
              print(f"Notification sent: HTTP {response.status}")
          PY

      - name: Commit inventory DB updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add db/kia_cpo_inventory.csv db/kia_cpo_inventory.update.json
          if git diff --cached --quiet; then
            echo "No DB changes to commit."
          else
            git commit -m "Update Kia CPO inventory [skip ci]"
            git pull --rebase origin "$GITHUB_REF_NAME"
            git push || {
              git pull --rebase origin "$GITHUB_REF_NAME"
              git push
            }
          fi

      - name: Upload scrape outputs
        uses: actions/upload-artifact@v4
        with:
          name: kia-cpo-scrape-${{ github.run_id }}
          path: |
            data/*.csv
            data/*.json
            db/*.csv
            db/*.json
          retention-days: 30
